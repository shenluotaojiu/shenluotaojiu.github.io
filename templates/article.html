<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | 神洛桃玖</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <span class="logo-bracket">{</span>
                <span class="logo-text">神洛桃玖</span>
                <span class="logo-bracket">}</span>
            </a>
            <div class="nav-menu">
                <a href="../blog.html" class="nav-link">
                    <i class="fas fa-blog"></i> <span>博客</span>
                </a>
                <a href="../notes.html" class="nav-link {{#if isNote}}active{{/if}}">
                    <i class="fas fa-book"></i> <span>笔记</span>
                </a>
                <a href="../skills.html" class="nav-link">
                    <i class="fas fa-code"></i> <span>技能</span>
                </a>
                <a href="https://github.com/shenluotaojiu" target="_blank" class="nav-link nav-github">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 文章页面 -->
    <main class="article-page">
        <div class="article-container">
            <header class="article-header">
                <div class="article-meta">
                    <span><i class="far fa-calendar-alt"></i> {{date}}</span>
                    <span><i class="far fa-folder"></i> {{category}}</span>
                    <span><i class="fas fa-font"></i> {{wordCount}} 字</span>
                    <span><i class="far fa-clock"></i> {{readingTime}} 分钟</span>
                </div>
                <h1 class="article-title">{{title}}</h1>
                <div class="article-tags">
                    {{#each tags}}
                    <span class="article-tag">{{this}}</span>
                    {{/each}}
                </div>
            </header>

            <article class="markdown-body">
{{content}}
            </article>

            <!-- 文章导航 -->
            <nav class="article-nav">
                <a href="../{{backLink}}.html" class="article-nav-link">
                    <span class="nav-label"><i class="fas fa-arrow-left"></i> 返回</span>
                    <span class="nav-title">{{backText}}</span>
                </a>
            </nav>
        </div>
    </main>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="../js/main.js"></script>
</body>
</html>
